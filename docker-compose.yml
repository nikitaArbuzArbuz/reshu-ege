name: egeprep

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: egeprep
      POSTGRES_USER: egeprep
      POSTGRES_PASSWORD: egeprep
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egeprep -d egeprep"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/egeprep
      SPRING_DATASOURCE_USERNAME: egeprep
      SPRING_DATASOURCE_PASSWORD: egeprep
      JWT_SECRET: ${JWT_SECRET:-a7f3c9e2b8d1f4e6a0c5b9d3e7f1a2c8d4e6f0a2b4c6d8e0f2a4b6c8d0e2f4a6b8c0d2e4f6a8b0c2d4e6f8a0b2c4d6e8f0a2b4c6d8e0f2a4b6c8d0e2f4}
      APP_CORS_ORIGINS: http://localhost:3000,https://localhost:3000
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
