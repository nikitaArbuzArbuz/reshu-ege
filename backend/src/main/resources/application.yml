spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/egeprep}
    username: ${SPRING_DATASOURCE_USERNAME:egeprep}
    password: ${SPRING_DATASOURCE_PASSWORD:egeprep}
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Существующий volume Postgres уже содержит таблицы без flyway_schema_history (раньше без Flyway / сброс частичный)
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-long-random-string-at-least-32-chars}
    expiration-ms: 86400000
  security:
    cors-allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://localhost:3000}
    jwt-cookie-name: ACCESS_TOKEN
    jwt-cookie-path: /api
    auth-rate-limit-per-minute: ${AUTH_RATE_LIMIT_PER_MINUTE:30}
