spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/egeprep}
    username: ${SPRING_DATASOURCE_USERNAME:egeprep}
    password: ${SPRING_DATASOURCE_PASSWORD:egeprep}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-long-random-string-at-least-32-chars}
    expiration-ms: 86400000
